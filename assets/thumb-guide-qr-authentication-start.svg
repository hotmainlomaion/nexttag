<svg viewBox="0 0 640 360" width="640" height="360" xmlns="http://www.w3.org/2000/svg" font-family="Switzer,Pretendard,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050D22"/>
      <stop offset="0.55" stop-color="#071633"/>
      <stop offset="1" stop-color="#0A2050"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#34DAFF" stop-opacity="0.14"/>
      <stop offset="0.6" stop-color="#34DAFF" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#34DAFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#002BFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#002BFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="cardEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="beamBand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34DAFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#34DAFF" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="beamLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34DAFF" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#34DAFF" stop-opacity="0.9"/>
      <stop offset="0.75" stop-color="#8FEBFF" stop-opacity="1"/>
      <stop offset="1" stop-color="#34DAFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34DAFF"/>
      <stop offset="1" stop-color="#002BFF"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="soft2" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <linearGradient id="fadeX" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000"/>
      <stop offset="0.18" stop-color="#FFFFFF"/>
      <stop offset="0.85" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <mask id="beamMask">
      <rect x="120" y="100" width="430" height="100" fill="url(#fadeX)"/>
    </mask>
  </defs>

  <!-- background -->
  <rect width="640" height="360" fill="url(#bg)"/>
  <circle cx="435" cy="185" r="230" fill="url(#halo)"/>
  <circle cx="90" cy="330" r="200" fill="url(#haloBlue)"/>
  <!-- faint horizon lines -->
  <g stroke="#FFFFFF" stroke-width="1" opacity="0.05">
    <line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="190" x2="640" y2="190"/>
    <line x1="0" y1="260" x2="640" y2="260"/>
  </g>

  <!-- drop shadow under label -->
  <ellipse cx="422" cy="312" rx="120" ry="14" fill="#000000" opacity="0.35" filter="url(#soft2)"/>

  <!-- product label -->
  <g transform="rotate(-3 421 190)">
    <rect x="330" y="78" width="182" height="224" rx="16" fill="url(#cardFill)" stroke="url(#cardEdge)" stroke-width="1"/>
    <path d="M346 79 h150" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1" stroke-linecap="round"/>

    <!-- QR symbol : 15x15 grid, m=7 -->
    <g fill="#EAF7FF" transform="translate(368.5 104)">
      <!-- finder patterns -->
      <rect x="3.5" y="3.5" width="42" height="42" rx="7" fill="none" stroke="#EAF7FF" stroke-width="6"/>
      <rect x="14" y="14" width="21" height="21" rx="4" fill="#34DAFF"/>
      <rect x="59.5" y="3.5" width="42" height="42" rx="7" fill="none" stroke="#EAF7FF" stroke-width="6"/>
      <rect x="70" y="14" width="21" height="21" rx="4" fill="#EAF7FF"/>
      <rect x="3.5" y="59.5" width="42" height="42" rx="7" fill="none" stroke="#EAF7FF" stroke-width="6"/>
      <rect x="14" y="70" width="21" height="21" rx="4" fill="#EAF7FF"/>
      <!-- data modules -->
      <rect x="7" y="49" width="7" height="7" rx="1.5"/>
      <rect x="21" y="49" width="7" height="7" rx="1.5"/>
      <rect x="35" y="49" width="7" height="7" rx="1.5"/>
      <rect x="63" y="49" width="7" height="7" rx="1.5"/>
      <rect x="84" y="49" width="7" height="7" rx="1.5"/>
      <rect x="98" y="49" width="7" height="7" rx="1.5"/>
      <rect x="49" y="7" width="7" height="7" rx="1.5"/>
      <rect x="49" y="21" width="7" height="7" rx="1.5"/>
      <rect x="49" y="35" width="7" height="7" rx="1.5"/>
      <rect x="49" y="63" width="7" height="7" rx="1.5"/>
      <rect x="49" y="77" width="7" height="7" rx="1.5"/>
      <rect x="49" y="98" width="7" height="7" rx="1.5"/>
      <rect x="56" y="56" width="7" height="7" rx="1.5" fill="#34DAFF"/>
      <rect x="77" y="56" width="7" height="7" rx="1.5"/>
      <rect x="98" y="56" width="7" height="7" rx="1.5"/>
      <rect x="63" y="63" width="7" height="7" rx="1.5"/>
      <rect x="84" y="63" width="7" height="7" rx="1.5"/>
      <rect x="56" y="70" width="7" height="7" rx="1.5"/>
      <rect x="70" y="70" width="7" height="7" rx="1.5" fill="#34DAFF"/>
      <rect x="91" y="70" width="7" height="7" rx="1.5"/>
      <rect x="63" y="77" width="7" height="7" rx="1.5"/>
      <rect x="98" y="77" width="7" height="7" rx="1.5"/>
      <rect x="56" y="84" width="7" height="7" rx="1.5"/>
      <rect x="70" y="84" width="7" height="7" rx="1.5"/>
      <rect x="84" y="84" width="7" height="7" rx="1.5" fill="#34DAFF"/>
      <rect x="63" y="91" width="7" height="7" rx="1.5"/>
      <rect x="91" y="91" width="7" height="7" rx="1.5"/>
      <rect x="56" y="98" width="7" height="7" rx="1.5"/>
      <rect x="77" y="98" width="7" height="7" rx="1.5"/>
      <rect x="98" y="98" width="7" height="7" rx="1.5"/>
    </g>

    <!-- label text placeholders -->
    <g stroke="#FFFFFF" stroke-linecap="round">
      <line x1="368" y1="243" x2="474" y2="243" stroke-width="5" stroke-opacity="0.22"/>
      <line x1="368" y1="259" x2="440" y2="259" stroke-width="5" stroke-opacity="0.12"/>
      <line x1="368" y1="278" x2="412" y2="278" stroke-width="5" stroke-opacity="0.12"/>
    </g>

    <!-- verified check -->
    <g transform="translate(497 288)">
      <circle r="20" fill="#16A34A" opacity="0.4" filter="url(#soft)"/>
      <circle r="15" fill="#0A2417" stroke="#16A34A" stroke-width="1.5"/>
      <path d="M-6 0.5 L-1.5 5 L6.5 -4.5" fill="none" stroke="#3FCF77" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- scan beam -->
  <g mask="url(#beamMask)">
    <rect x="120" y="118" width="430" height="56" fill="url(#beamBand)" opacity="0.9"/>
    <rect x="120" y="172" width="430" height="2.5" fill="url(#beamLine)" filter="url(#soft)" opacity="0.9"/>
    <rect x="120" y="172.5" width="430" height="1.6" fill="url(#beamLine)"/>
    <circle cx="443" cy="173.3" r="3" fill="#CFF4FF"/>
    <circle cx="443" cy="173.3" r="8" fill="#34DAFF" opacity="0.5" filter="url(#soft)"/>
  </g>

  <!-- title -->
  <g>
    <rect x="50" y="60" width="34" height="3" rx="1.5" fill="url(#accent)"/>
    <text x="50" y="102" font-size="30" font-weight="650" fill="#F4FAFF" letter-spacing="-0.5">난수 QR</text>
  </g>
</svg>
