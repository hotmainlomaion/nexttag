<svg viewBox="0 0 640 360" width="640" height="360" xmlns="http://www.w3.org/2000/svg" font-family="Switzer,Pretendard,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050B1E"/>
      <stop offset="0.55" stop-color="#081433"/>
      <stop offset="1" stop-color="#0A1B4A"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.72" cy="0.62" r="0.75">
      <stop offset="0" stop-color="#123B8F" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#0B2260" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0B2260" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="areaTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34DAFF" stop-opacity="0.8"/>
      <stop offset="0.6" stop-color="#0E6FD8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0A5ACD" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="areaMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E90E8" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#002BFF" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="areaLow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F5BD8" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#001A66" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34DAFF" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#34DAFF" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#7FE9FF"/>
    </linearGradient>
    <linearGradient id="stream" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34DAFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#34DAFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#34DAFF" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#halo)"/>

  <!-- faint grid -->
  <g stroke="#9FC3FF" stroke-width="1" opacity="0.06">
    <line x1="60" y1="96" x2="600" y2="96"/>
    <line x1="60" y1="150" x2="600" y2="150"/>
    <line x1="60" y1="204" x2="600" y2="204"/>
    <line x1="60" y1="258" x2="600" y2="258"/>
  </g>
  <!-- baseline + ticks -->
  <line x1="60" y1="312" x2="600" y2="312" stroke="#9FC3FF" stroke-opacity="0.22" stroke-width="1"/>
  <g stroke="#9FC3FF" stroke-opacity="0.22" stroke-width="1">
    <line x1="150" y1="312" x2="150" y2="317"/>
    <line x1="240" y1="312" x2="240" y2="317"/>
    <line x1="330" y1="312" x2="330" y2="317"/>
    <line x1="420" y1="312" x2="420" y2="317"/>
    <line x1="510" y1="312" x2="510" y2="317"/>
    <line x1="600" y1="312" x2="600" y2="317"/>
  </g>

  <!-- inflow streams: thin curves feeding the accumulation -->
  <g fill="none" stroke="url(#stream)" stroke-width="1.1">
    <path d="M -10 120 C 90 118, 160 168, 262 208"/>
    <path d="M -10 158 C 100 154, 170 196, 268 228"/>
    <path d="M -10 196 C 96 194, 176 222, 262 248"/>
    <path d="M -10 236 C 104 234, 180 250, 268 268"/>
    <path d="M -10 274 C 100 272, 186 276, 264 288"/>
  </g>

  <!-- accumulated layers (stacked area) -->
  <path d="M 130 312 C 210 306, 268 296, 330 288 C 402 279, 470 272, 600 262 L 600 312 Z" fill="url(#areaLow)"/>
  <path d="M 150 312 C 230 300, 288 282, 348 264 C 420 243, 488 228, 600 214 L 600 312 Z" fill="url(#areaMid)"/>
  <path d="M 170 312 C 252 296, 310 268, 372 232 C 442 192, 506 160, 600 132 L 600 312 Z" fill="url(#areaTop)"/>

  <!-- crest line with glow -->
  <path d="M 170 312 C 252 296, 310 268, 372 232 C 442 192, 506 160, 600 132" fill="none" stroke="url(#topLine)" stroke-width="1.8" filter="url(#glow)"/>

  <!-- secondary crest hairlines -->
  <path d="M 150 312 C 230 300, 288 282, 348 264 C 420 243, 488 228, 600 214" fill="none" stroke="#8FC9FF" stroke-opacity="0.28" stroke-width="1"/>
  <path d="M 130 312 C 210 306, 268 296, 330 288 C 402 279, 470 272, 600 262" fill="none" stroke="#6FA9E8" stroke-opacity="0.18" stroke-width="1"/>

  <!-- data particles drifting along the streams -->
  <g fill="#BFEFFF">
    <circle cx="52" cy="121" r="1.4" opacity="0.5"/>
    <circle cx="118" cy="132" r="1.1" opacity="0.35"/>
    <circle cx="186" cy="172" r="1.6" opacity="0.6"/>
    <circle cx="236" cy="196" r="1.2" opacity="0.45"/>
    <circle cx="76" cy="157" r="1.2" opacity="0.4"/>
    <circle cx="152" cy="178" r="1.5" opacity="0.55"/>
    <circle cx="214" cy="210" r="1.1" opacity="0.4"/>
    <circle cx="64" cy="196" r="1.3" opacity="0.45"/>
    <circle cx="142" cy="212" r="1.1" opacity="0.35"/>
    <circle cx="206" cy="238" r="1.5" opacity="0.55"/>
    <circle cx="92" cy="236" r="1.2" opacity="0.4"/>
    <circle cx="168" cy="248" r="1.4" opacity="0.5"/>
    <circle cx="228" cy="262" r="1.1" opacity="0.35"/>
    <circle cx="84" cy="273" r="1.2" opacity="0.4"/>
    <circle cx="158" cy="277" r="1.1" opacity="0.35"/>
    <circle cx="222" cy="284" r="1.4" opacity="0.5"/>
  </g>

  <!-- luminous particles riding the crest -->
  <g fill="#7FE9FF" filter="url(#softGlow)">
    <circle cx="372" cy="232" r="2" opacity="0.85"/>
    <circle cx="452" cy="187" r="1.6" opacity="0.7"/>
    <circle cx="524" cy="154" r="1.8" opacity="0.8"/>
  </g>
  <circle cx="583" cy="137" r="3" fill="#CFF6FF" filter="url(#glow)"/>

  <!-- title -->
  <text x="60" y="72" font-size="22" font-weight="600" fill="#F4F9FF" letter-spacing="-0.2">1st-party 데이터</text>
  <rect x="60" y="86" width="30" height="2" rx="1" fill="#34DAFF" opacity="0.9"/>
</svg>
