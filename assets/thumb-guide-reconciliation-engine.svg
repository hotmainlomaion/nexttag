<svg viewBox="0 0 640 360" width="640" height="360" xmlns="http://www.w3.org/2000/svg" font-family="Switzer,Pretendard,sans-serif">
  <defs>
    <!-- background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050D24"/>
      <stop offset="0.55" stop-color="#081737"/>
      <stop offset="1" stop-color="#0A1E4E"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="0.5" cy="0.52" r="0.55">
      <stop offset="0" stop-color="#34DAFF" stop-opacity="0.14"/>
      <stop offset="0.5" stop-color="#1C4DFF" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- ribbon gradients (userSpace so they follow x) -->
    <linearGradient id="ribbonCyanRed" gradientUnits="userSpaceOnUse" x1="-30" y1="0" x2="660" y2="0">
      <stop offset="0" stop-color="#34DAFF" stop-opacity="0"/>
      <stop offset="0.12" stop-color="#34DAFF" stop-opacity="0.85"/>
      <stop offset="0.52" stop-color="#34DAFF"/>
      <stop offset="0.72" stop-color="#8A7BD8"/>
      <stop offset="0.88" stop-color="#DC2626" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#DC2626" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ribbonBlueGreen" gradientUnits="userSpaceOnUse" x1="-30" y1="0" x2="660" y2="0">
      <stop offset="0" stop-color="#2B59FF" stop-opacity="0"/>
      <stop offset="0.12" stop-color="#2B59FF" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#3D6BFF"/>
      <stop offset="0.72" stop-color="#2FA97E"/>
      <stop offset="0.88" stop-color="#16A34A" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#16A34A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="coreFade" gradientUnits="userSpaceOnUse" x1="-30" y1="0" x2="660" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="0.85" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="greenGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#16A34A" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#16A34A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#DC2626" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#EAF7FF" stop-opacity="0.5"/>
      <stop offset="0.35" stop-color="#34DAFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#34DAFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="blurL" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="blurM" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="blurS" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="1.4"/></filter>
  </defs>

  <!-- background -->
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#centerGlow)"/>

  <!-- ultra-subtle grid -->
  <g stroke="#8FB6FF" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="90" x2="640" y2="90"/>
    <line x1="0" y1="150" x2="640" y2="150"/>
    <line x1="0" y1="210" x2="640" y2="210"/>
    <line x1="0" y1="270" x2="640" y2="270"/>
  </g>
  <!-- reconciliation axis -->
  <line x1="320" y1="52" x2="320" y2="330" stroke="#BFE7FF" stroke-width="0.6" opacity="0.1" stroke-dasharray="1 5"/>

  <!-- ===== ribbon A : cyan (top-left) -> center -> lower-right (red / deviation) ===== -->
  <g fill="none" stroke-linecap="round">
    <path d="M -30 96 C 150 78, 252 148, 320 190 C 388 232, 480 260, 670 274"
          stroke="url(#ribbonCyanRed)" stroke-width="30" opacity="0.10" filter="url(#blurL)"/>
    <path d="M -30 96 C 150 78, 252 148, 320 190 C 388 232, 480 260, 670 274"
          stroke="url(#ribbonCyanRed)" stroke-width="13" opacity="0.28" filter="url(#blurM)"/>
    <path d="M -30 96 C 150 78, 252 148, 320 190 C 388 232, 480 260, 670 274"
          stroke="url(#ribbonCyanRed)" stroke-width="4.5" opacity="0.85" filter="url(#blurS)"/>
    <path d="M -30 96 C 150 78, 252 148, 320 190 C 388 232, 480 260, 670 274"
          stroke="url(#coreFade)" stroke-width="1.1"/>
    <!-- companion hairlines -->
    <path d="M -30 84 C 150 66, 254 138, 322 181 C 390 224, 482 252, 670 265"
          stroke="url(#ribbonCyanRed)" stroke-width="0.8" opacity="0.35"/>
    <path d="M -30 110 C 150 92, 250 160, 318 200 C 386 241, 478 269, 670 284"
          stroke="url(#ribbonCyanRed)" stroke-width="0.8" opacity="0.25"/>
  </g>

  <!-- ===== ribbon B : blue (bottom-left) -> center -> upper-right (green / match) ===== -->
  <g fill="none" stroke-linecap="round">
    <path d="M -30 268 C 150 286, 252 232, 320 190 C 388 148, 480 116, 670 100"
          stroke="url(#ribbonBlueGreen)" stroke-width="30" opacity="0.12" filter="url(#blurL)"/>
    <path d="M -30 268 C 150 286, 252 232, 320 190 C 388 148, 480 116, 670 100"
          stroke="url(#ribbonBlueGreen)" stroke-width="13" opacity="0.32" filter="url(#blurM)"/>
    <path d="M -30 268 C 150 286, 252 232, 320 190 C 388 148, 480 116, 670 100"
          stroke="url(#ribbonBlueGreen)" stroke-width="4.5" opacity="0.9" filter="url(#blurS)"/>
    <path d="M -30 268 C 150 286, 252 232, 320 190 C 388 148, 480 116, 670 100"
          stroke="url(#coreFade)" stroke-width="1.1"/>
    <!-- companion hairlines -->
    <path d="M -30 280 C 150 298, 254 242, 322 199 C 390 156, 482 124, 670 109"
          stroke="url(#ribbonBlueGreen)" stroke-width="0.8" opacity="0.35"/>
    <path d="M -30 254 C 150 272, 250 222, 318 180 C 386 139, 478 108, 670 91"
          stroke="url(#ribbonBlueGreen)" stroke-width="0.8" opacity="0.25"/>
  </g>

  <!-- convergence point -->
  <circle cx="320" cy="190" r="60" fill="url(#nodeGlow)"/>
  <circle cx="320" cy="190" r="17" fill="none" stroke="#DFF4FF" stroke-width="0.7" opacity="0.4"/>
  <circle cx="320" cy="190" r="3" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="320" cy="190" r="7" fill="none" stroke="#34DAFF" stroke-width="0.8" opacity="0.55"/>

  <!-- outcome glows -->
  <ellipse cx="600" cy="104" rx="110" ry="58" fill="url(#greenGlow)"/>
  <ellipse cx="600" cy="270" rx="110" ry="58" fill="url(#redGlow)"/>

  <!-- data particles along streams -->
  <g fill="#EAF9FF">
    <circle cx="96" cy="87" r="1.6" opacity="0.75"/>
    <circle cx="176" cy="94" r="1.2" opacity="0.55"/>
    <circle cx="252" cy="140" r="1.5" opacity="0.7"/>
    <circle cx="120" cy="277" r="1.6" opacity="0.7"/>
    <circle cx="208" cy="257" r="1.2" opacity="0.5"/>
    <circle cx="270" cy="221" r="1.5" opacity="0.65"/>
    <circle cx="404" cy="147" r="1.6" opacity="0.8"/>
    <circle cx="470" cy="120" r="1.3" opacity="0.6"/>
    <circle cx="537" cy="106" r="1.4" fill="#7BE3A9" opacity="0.7"/>
    <circle cx="412" cy="239" r="1.5" opacity="0.7"/>
    <circle cx="478" cy="259" r="1.2" opacity="0.5"/>
    <circle cx="540" cy="269" r="1.4" fill="#F08A8A" opacity="0.65"/>
  </g>

  <!-- title -->
  <g>
    <rect x="36" y="34" width="18" height="2" rx="1" fill="#34DAFF" opacity="0.9"/>
    <text x="36" y="60" font-size="15" font-weight="600" fill="#F4FAFF" opacity="0.94" letter-spacing="0.5">대조 엔진</text>
  </g>
</svg>
