<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" font-family="Switzer,Pretendard,sans-serif">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#050D26"/>
<stop offset="0.55" stop-color="#08173F"/>
<stop offset="1" stop-color="#0A1E55"/>
</linearGradient>
<radialGradient id="glowbg" cx="0.62" cy="0.42" r="0.75">
<stop offset="0" stop-color="#0E3FBF" stop-opacity="0.30"/>
<stop offset="0.6" stop-color="#0E3FBF" stop-opacity="0.08"/>
<stop offset="1" stop-color="#0E3FBF" stop-opacity="0"/>
</radialGradient>
<linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#34DAFF" stop-opacity="0.26"/>
<stop offset="0.55" stop-color="#0F5BFF" stop-opacity="0.10"/>
<stop offset="1" stop-color="#002BFF" stop-opacity="0.02"/>
</linearGradient>
<linearGradient id="area2" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#4D74FF" stop-opacity="0.10"/>
<stop offset="1" stop-color="#002BFF" stop-opacity="0"/>
</linearGradient>
<linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#2E7BFF" stop-opacity="0.55"/>
<stop offset="0.42" stop-color="#34DAFF"/>
<stop offset="1" stop-color="#9BEAFF"/>
</linearGradient>
<filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
<feGaussianBlur stdDeviation="7"/>
</filter>
<filter id="soft2" x="-120%" y="-120%" width="340%" height="340%">
<feGaussianBlur stdDeviation="10"/>
</filter>
</defs>

<rect width="640" height="360" fill="url(#bg)"/>
<rect width="640" height="360" fill="url(#glowbg)"/>

<!-- faint horizontal guides -->
<g stroke="#AFCBFF" stroke-opacity="0.06" stroke-width="1">
<line x1="70" y1="132" x2="586" y2="132"/>
<line x1="70" y1="188" x2="586" y2="188"/>
<line x1="70" y1="244" x2="586" y2="244"/>
</g>
<line x1="70" y1="300" x2="586" y2="300" stroke="#AFCBFF" stroke-opacity="0.16" stroke-width="1"/>

<!-- secondary ghost series (depth layer) -->
<path d="M86 288 C150 285 200 279 258 268 C330 254 400 240 470 226 C516 217 552 210 586 203 L586 300 L86 300 Z" fill="url(#area2)"/>
<path d="M86 288 C150 285 200 279 258 268 C330 254 400 240 470 226 C516 217 552 210 586 203" fill="none" stroke="#7FA6FF" stroke-opacity="0.22" stroke-width="1.2"/>

<!-- main series: mandate coverage rising 2025 -> 2030 -->
<path d="M86 262 C130 258 160 252 200 242 C240 232 258 220 286 200 C312 181 330 172 372 158 C428 139 470 128 512 118 C540 111 566 106 586 101 L586 300 L86 300 Z" fill="url(#area)"/>
<path d="M86 262 C130 258 160 252 200 242 C240 232 258 220 286 200 C312 181 330 172 372 158 C428 139 470 128 512 118 C540 111 566 106 586 101" fill="none" stroke="url(#stroke)" stroke-width="2.4" stroke-linecap="round" filter="url(#soft)" opacity="0.55"/>
<path d="M86 262 C130 258 160 252 200 242 C240 232 258 220 286 200 C312 181 330 172 372 158 C428 139 470 128 512 118 C540 111 566 106 586 101" fill="none" stroke="url(#stroke)" stroke-width="2.2" stroke-linecap="round"/>

<!-- 2027 marker -->
<line x1="286" y1="200" x2="286" y2="300" stroke="#34DAFF" stroke-opacity="0.28" stroke-width="1" stroke-dasharray="1 5" stroke-linecap="round"/>
<circle cx="286" cy="200" r="16" fill="#34DAFF" opacity="0.35" filter="url(#soft2)"/>
<circle cx="286" cy="200" r="8" fill="#34DAFF" opacity="0.18"/>
<circle cx="286" cy="200" r="4" fill="#EAFBFF"/>
<circle cx="286" cy="200" r="4" fill="none" stroke="#34DAFF" stroke-width="1.4" stroke-opacity="0.9"/>

<!-- subtle end tick 2030 -->
<circle cx="586" cy="101" r="2.4" fill="#9BEAFF" opacity="0.85"/>

<!-- year ticks -->
<g fill="#C9DCFF" font-size="11" text-anchor="middle" letter-spacing="0.06em">
<text x="86" y="323" fill-opacity="0.34">2025</text>
<text x="186" y="323" fill-opacity="0.22">2026</text>
<text x="286" y="323" fill-opacity="0.72">2027</text>
<text x="386" y="323" fill-opacity="0.22">2028</text>
<text x="486" y="323" fill-opacity="0.22">2029</text>
<text x="586" y="323" fill-opacity="0.34">2030</text>
</g>
<g stroke="#C9DCFF" stroke-opacity="0.18" stroke-width="1">
<line x1="86" y1="300" x2="86" y2="305"/>
<line x1="186" y1="300" x2="186" y2="305"/>
<line x1="286" y1="300" x2="286" y2="305"/>
<line x1="386" y1="300" x2="386" y2="305"/>
<line x1="486" y1="300" x2="486" y2="305"/>
<line x1="586" y1="300" x2="586" y2="305"/>
</g>

<!-- title -->
<text x="70" y="78" fill="#FFFFFF" font-size="27" font-weight="650" letter-spacing="-0.01em">추적 의무화</text>
</svg>
