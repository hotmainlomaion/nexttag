<svg viewBox="0 0 640 360" width="640" height="360" xmlns="http://www.w3.org/2000/svg" font-family="Switzer,Pretendard,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060D1F"/>
      <stop offset="0.55" stop-color="#08122E"/>
      <stop offset="1" stop-color="#0A1C4E"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.62" cy="0.32" r="0.8">
      <stop offset="0" stop-color="#1B3FBF" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#0E2470" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#0E2470" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barDim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E6BFF" stop-opacity="0.80"/>
      <stop offset="1" stop-color="#002BFF" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="barHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7FEAFF"/>
      <stop offset="0.35" stop-color="#34DAFF"/>
      <stop offset="1" stop-color="#002BFF"/>
    </linearGradient>
    <linearGradient id="baseline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.12" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="0.88" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="softGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#bgGlow)"/>

  <!-- title -->
  <text x="56" y="64" font-size="21" font-weight="600" fill="#FFFFFF" letter-spacing="0.5">위조 노출도</text>
  <text x="56" y="86" font-size="10.5" fill="#8FA6D9" letter-spacing="2.5" opacity="0.7">INDUSTRY EXPOSURE INDEX · 2025</text>

  <!-- faint gridlines -->
  <line x1="56" y1="150" x2="584" y2="150" stroke="#FFFFFF" stroke-opacity="0.06"/>
  <line x1="56" y1="219" x2="584" y2="219" stroke="#FFFFFF" stroke-opacity="0.045"/>
  <text x="584" y="145" font-size="9" fill="#FFFFFF" opacity="0.28" text-anchor="end">75</text>
  <text x="584" y="214" font-size="9" fill="#FFFFFF" opacity="0.22" text-anchor="end">50</text>

  <!-- columns · baseline y=288 · 1pt = 1.84px -->
  <path d="M86 288 v-49 q0 -8 8 -8 h26 q8 0 8 8 v49 z" fill="url(#barDim)"/>
  <path d="M168 288 v-76.6 q0 -8 8 -8 h26 q8 0 8 8 v76.6 z" fill="url(#barDim)"/>
  <path d="M250 288 v-63.8 q0 -8 8 -8 h26 q8 0 8 8 v63.8 z" fill="url(#barDim)"/>

  <!-- hero column: cosmetics 82 -->
  <g>
    <path d="M332 288 v-142.9 q0 -8 8 -8 h26 q8 0 8 8 v142.9 z" fill="#34DAFF" opacity="0.45" filter="url(#glow)"/>
    <path d="M332 288 v-142.9 q0 -8 8 -8 h26 q8 0 8 8 v142.9 z" fill="url(#barHero)"/>
    <path d="M332 288 v-142.9 q0 -8 8 -8 h4 v150.9 h-4 z" fill="#FFFFFF" opacity="0.16"/>
    <circle cx="353" cy="137.1" r="7" fill="#34DAFF" opacity="0.55" filter="url(#softGlow)"/>
    <circle cx="353" cy="137.1" r="3" fill="#FFFFFF"/>
    <text x="353" y="118" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.3">82</text>
    <text x="353" y="309" font-size="10.5" fill="#BFE9FF" text-anchor="middle" opacity="0.9">화장품</text>
  </g>

  <path d="M414 288 v-87.7 q0 -8 8 -8 h26 q8 0 8 8 v87.7 z" fill="url(#barDim)"/>
  <path d="M496 288 v-41.7 q0 -8 8 -8 h26 q8 0 8 8 v41.7 z" fill="url(#barDim)"/>

  <!-- baseline -->
  <rect x="48" y="288" width="544" height="1.2" fill="url(#baseline)"/>

  <!-- muted category labels -->
  <text x="107" y="309" font-size="10.5" fill="#8FA6D9" text-anchor="middle" opacity="0.5">패션</text>
  <text x="189" y="309" font-size="10.5" fill="#8FA6D9" text-anchor="middle" opacity="0.5">제약</text>
  <text x="271" y="309" font-size="10.5" fill="#8FA6D9" text-anchor="middle" opacity="0.5">건기식</text>
  <text x="435" y="309" font-size="10.5" fill="#8FA6D9" text-anchor="middle" opacity="0.5">리테일</text>
  <text x="517" y="309" font-size="10.5" fill="#8FA6D9" text-anchor="middle" opacity="0.5">기타</text>
</svg>
