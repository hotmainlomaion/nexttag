    <style>
      .kr{font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;}
      .lt{font-family:"Helvetica Neue",Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#g)"/>

  <!-- brand mark -->
  <g transform="translate(80,74)" fill="#0D0D0D">
    <path fill-rule="evenodd" d="M0 9A9 9 0 0 1 9 0h13a9 9 0 0 1 9 9v13a9 9 0 0 1-9 9H9a9 9 0 0 1-9-9V9Zm10 2a4 4 0 0 0-4 4v8a4 4 0 0 0 4 4h11a4 4 0 0 0 4-4v-8a4 4 0 0 0-4-4H10Z"/>
    <rect x="11" y="13" width="9" height="9" rx="2.6"/>
    <rect x="40" y="0" width="26" height="26" rx="7"/>
    <rect x="0" y="40" width="26" height="26" rx="7"/>
    <rect x="40" y="40" width="11" height="11" rx="3"/>
    <rect x="55" y="55" width="11" height="11" rx="3"/>
  </g>
  <text x="160" y="103" class="lt" font-size="30" font-weight="900" letter-spacing="-1" fill="#0D0D0D">NEXT TAG</text>

  <!-- headline -->
