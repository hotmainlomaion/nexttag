<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="Switzer,Pretendard,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#03050C"/>
      <stop offset="0.55" stop-color="#071026"/>
      <stop offset="1" stop-color="#0A1734"/>
    </linearGradient>
    <radialGradient id="hubHalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#34DAFF" stop-opacity="0.55"/>
      <stop offset="0.35" stop-color="#34DAFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#34DAFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="deepGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#002BFF" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#002BFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softer" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- ambient depth -->
  <ellipse cx="430" cy="150" rx="260" ry="180" fill="url(#deepGlow)"/>
  <circle cx="150" cy="280" r="90" fill="url(#deepGlow)" opacity="0.5"/>

  <!-- far background nodes (blurred, depth) -->
  <g filter="url(#softer)">
    <circle cx="120" cy="120" r="7" fill="#3A5AC8" opacity="0.22"/>
    <circle cx="560" cy="300" r="9" fill="#2C48B0" opacity="0.20"/>
    <circle cx="360" cy="320" r="6" fill="#3A5AC8" opacity="0.16"/>
    <circle cx="620" cy="70" r="7" fill="#34DAFF" opacity="0.10"/>
  </g>

  <!-- faint distant stars -->
  <g fill="#FFFFFF">
    <circle cx="80" cy="60" r="0.9" opacity="0.28"/>
    <circle cx="180" cy="40" r="0.7" opacity="0.20"/>
    <circle cx="300" cy="330" r="0.8" opacity="0.18"/>
    <circle cx="470" cy="35" r="0.9" opacity="0.26"/>
    <circle cx="608" cy="235" r="0.8" opacity="0.22"/>
    <circle cx="55" cy="200" r="0.7" opacity="0.18"/>
    <circle cx="250" cy="150" r="0.7" opacity="0.22"/>
    <circle cx="530" cy="150" r="0.7" opacity="0.24"/>
    <circle cx="120" cy="320" r="0.8" opacity="0.16"/>
    <circle cx="400" cy="40" r="0.7" opacity="0.20"/>
    <circle cx="30" cy="120" r="0.8" opacity="0.20"/>
  </g>

  <!-- constellation edges: soft curves -->
  <g fill="none" stroke-linecap="round">
    <!-- hub spokes -->
    <path d="M405 158 Q350 110 292 92" stroke="#34DAFF" stroke-width="0.9" opacity="0.45"/>
    <path d="M413 154 Q465 110 512 84" stroke="#34DAFF" stroke-width="0.9" opacity="0.42"/>
    <path d="M416 165 Q495 175 556 200" stroke="#34DAFF" stroke-width="0.9" opacity="0.38"/>
    <path d="M412 170 Q450 225 478 262" stroke="#34DAFF" stroke-width="0.9" opacity="0.36"/>
    <path d="M403 170 Q355 215 310 246" stroke="#34DAFF" stroke-width="0.9" opacity="0.40"/>
    <path d="M400 162 Q305 158 212 172" stroke="#34DAFF" stroke-width="0.9" opacity="0.42"/>
    <!-- second-degree links -->
    <path d="M285 86 Q220 70 162 82" stroke="#FFFFFF" stroke-width="0.7" opacity="0.20"/>
    <path d="M290 86 Q320 62 348 56" stroke="#FFFFFF" stroke-width="0.7" opacity="0.18"/>
    <path d="M520 78 Q560 96 594 128" stroke="#FFFFFF" stroke-width="0.7" opacity="0.20"/>
    <path d="M560 204 Q582 168 596 136" stroke="#FFFFFF" stroke-width="0.7" opacity="0.16"/>
    <path d="M482 268 Q525 245 558 208" stroke="#FFFFFF" stroke-width="0.7" opacity="0.16"/>
    <path d="M304 250 Q272 264 244 278" stroke="#FFFFFF" stroke-width="0.7" opacity="0.10"/>
    <path d="M206 176 Q178 132 160 88" stroke="#FFFFFF" stroke-width="0.7" opacity="0.16"/>
    <path d="M355 58 Q440 48 512 76" stroke="#FFFFFF" stroke-width="0.6" opacity="0.12"/>
  </g>

  <!-- outer nodes -->
  <g>
    <circle cx="288" cy="90" r="3.0" fill="#BFE9FF" opacity="0.9"/>
    <circle cx="288" cy="90" r="7" fill="#34DAFF" opacity="0.14" filter="url(#soft)"/>
    <circle cx="516" cy="81" r="3.4" fill="#DFF6FF" opacity="0.95"/>
    <circle cx="516" cy="81" r="8" fill="#34DAFF" opacity="0.16" filter="url(#soft)"/>
    <circle cx="559" cy="202" r="2.4" fill="#A9D9F5" opacity="0.85"/>
    <circle cx="480" cy="265" r="2.8" fill="#BFE9FF" opacity="0.88"/>
    <circle cx="480" cy="265" r="7" fill="#34DAFF" opacity="0.12" filter="url(#soft)"/>
    <circle cx="307" cy="248" r="2.6" fill="#BFE9FF" opacity="0.85"/>
    <circle cx="209" cy="174" r="2.9" fill="#DFF6FF" opacity="0.92"/>
    <circle cx="209" cy="174" r="7" fill="#34DAFF" opacity="0.13" filter="url(#soft)"/>
    <circle cx="352" cy="57" r="1.9" fill="#9CCBE8" opacity="0.75"/>
    <circle cx="158" cy="84" r="2.1" fill="#9CCBE8" opacity="0.75"/>
    <circle cx="597" cy="132" r="1.8" fill="#9CCBE8" opacity="0.7"/>
    <circle cx="241" cy="280" r="1.6" fill="#9CCBE8" opacity="0.5"/>
    <circle cx="128" cy="132" r="1.6" fill="#9CCBE8" opacity="0.55"/>
  </g>

  <!-- central hub with cyan glow -->
  <circle cx="408" cy="163" r="62" fill="url(#hubHalo)"/>
  <circle cx="408" cy="163" r="13" fill="#34DAFF" opacity="0.35" filter="url(#soft)"/>
  <circle cx="408" cy="163" r="6" fill="#EAFBFF"/>
  <circle cx="408" cy="163" r="9.5" fill="none" stroke="#34DAFF" stroke-width="0.8" opacity="0.55"/>

  <!-- title -->
  <text x="48" y="306" font-size="27" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">공급망 용어집</text>
</svg>
